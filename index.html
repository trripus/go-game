<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>围棋 - Go Game</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, 'Segoe UI', 'Noto Sans', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: #2c2416;
    color: #e8dccc;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    user-select: none;
  }
  .container {
    background: #3d3224;
    border-radius: 12px;
    padding: 24px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
  }
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 100%;
    padding: 0 4px;
  }
  .title {
    font-size: 22px;
    font-weight: 600;
    letter-spacing: 4px;
    color: #d4c5a6;
  }
  .title span { font-size: 14px; font-weight: 400; letter-spacing: 0; opacity: 0.6; margin-left: 8px; }
  .main-area {
    display: flex;
    gap: 20px;
    align-items: flex-start;
  }
  .board-wrapper {
    background: #c8a96e;
    border-radius: 8px;
    padding: 6px;
    box-shadow: inset 0 0 0 1px rgba(0,0,0,0.15), 0 4px 12px rgba(0,0,0,0.3);
    position: relative;
  }
  canvas#board {
    display: block;
    border-radius: 4px;
    cursor: pointer;
    touch-action: none;
  }
  .side-panel {
    display: flex;
    flex-direction: column;
    gap: 12px;
    min-width: 160px;
    max-width: 180px;
  }
  .panel-section {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 8px;
    padding: 12px;
  }
  .panel-section h3 {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: #a09070;
    margin-bottom: 8px;
    font-weight: 500;
  }
  .player-indicator {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .stone-icon {
    width: 28px; height: 28px;
    border-radius: 50%;
    flex-shrink: 0;
    border: 1px solid rgba(255,255,255,0.15);
  }
  .stone-icon.black { background: radial-gradient(circle at 35% 35%, #555, #111); }
  .stone-icon.white { background: radial-gradient(circle at 35% 35%, #fff, #bbb); }
  .player-name { font-size: 15px; font-weight: 500; }
  .capture-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 3px 0;
    font-size: 14px;
  }
  .capture-row .label { color: #a09070; }
  .capture-row .stone-dot {
    display: inline-block;
    width: 10px; height: 10px;
    border-radius: 50%;
    margin-right: 4px;
    vertical-align: middle;
  }
  .capture-row .stone-dot.b { background: radial-gradient(circle at 35% 35%, #555, #111); }
  .capture-row .stone-dot.w { background: radial-gradient(circle at 35% 35%, #fff, #bbb); border: 1px solid rgba(0,0,0,0.2); }
  .btn-group {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .btn {
    flex: 1;
    min-width: 60px;
    padding: 8px 6px;
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 6px;
    background: rgba(255,255,255,0.06);
    color: #e8dccc;
    font-size: 13px;
    font-family: inherit;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
    text-align: center;
    line-height: 1.2;
  }
  .btn:hover { background: rgba(255,255,255,0.12); border-color: rgba(255,255,255,0.25); }
  .btn:active { background: rgba(255,255,255,0.18); }
  .btn.primary {
    background: #6b5a3e;
    border-color: #8a7a5a;
    color: #f0e6d0;
  }
  .btn.primary:hover { background: #7d6b4a; }
  .btn.danger { border-color: rgba(200,80,60,0.3); color: #d09070; }
  .btn.danger:hover { background: rgba(200,80,60,0.15); border-color: rgba(200,80,60,0.5); }
  .btn.small { padding: 5px 8px; font-size: 12px; min-width: auto; flex: 0 1 auto; }
  .btn:disabled {
    opacity: 0.35;
    cursor: not-allowed;
    background: rgba(255,255,255,0.03);
  }
  .btn:disabled:hover { background: rgba(255,255,255,0.03); border-color: rgba(255,255,255,0.12); }
  .size-selector {
    display: flex;
    gap: 4px;
  }
  .size-btn {
    flex: 1;
    padding: 5px 0;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 4px;
    background: transparent;
    color: #b0a080;
    font-size: 13px;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
  }
  .size-btn:hover { background: rgba(255,255,255,0.08); }
  .size-btn.active {
    background: #6b5a3e;
    border-color: #8a7a5a;
    color: #f0e6d0;
  }
  .status-text {
    font-size: 13px;
    color: #b0a080;
    line-height: 1.4;
    min-height: 20px;
  }
  .modal-overlay {
    position: fixed;
    top:0; left:0; right:0; bottom:0;
    background: rgba(0,0,0,0.6);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
  }
  .modal-overlay.open {
    opacity: 1;
    pointer-events: auto;
  }
  .modal {
    background: #3d3224;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    padding: 28px 32px;
    min-width: 280px;
    max-width: 90vw;
    text-align: center;
    box-shadow: 0 12px 48px rgba(0,0,0,0.5);
  }
  .modal h2 { font-size: 22px; margin-bottom: 8px; color: #f0e6d0; }
  .modal .sub { color: #b0a080; font-size: 15px; margin-bottom: 16px; }
  .modal .scores {
    display: flex;
    justify-content: center;
    gap: 32px;
    margin: 16px 0;
  }
  .modal .scores .score-item { text-align: center; }
  .modal .scores .score-item .stone {
    width: 20px; height: 20px;
    border-radius: 50%;
    margin: 0 auto 4px;
  }
  .modal .scores .score-item .stone.b { background: radial-gradient(circle at 35% 35%, #555, #111); }
  .modal .scores .score-item .stone.w { background: radial-gradient(circle at 35% 35%, #fff, #bbb); border: 1px solid rgba(0,0,0,0.2); }
  .modal .scores .score-item .value { font-size: 28px; font-weight: 600; }
  .modal .scores .score-item .value.win { color: #f0d060; }
  .modal .btn { min-width: 80px; }
  .move-num {
    font-size: 12px;
    color: #706040;
    text-align: center;
    margin-top: 4px;
  }
  @media (max-width: 680px) {
    .container { padding: 12px; border-radius: 0; min-height: 100vh; justify-content: flex-start; gap: 12px; }
    .main-area { flex-direction: column; align-items: center; }
    .side-panel { min-width: auto; max-width: none; width: 100%; flex-direction: row; flex-wrap: wrap; }
    .side-panel .panel-section { flex: 1; min-width: 120px; }
    .title { font-size: 18px; }
    .header { flex-wrap: wrap; gap: 8px; }
  }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="title">围棋 <span>Go</span></div>
    <div class="status-text" id="statusText">黑棋落子</div>
  </div>
  <div class="main-area">
    <div class="board-wrapper">
      <canvas id="board"></canvas>
    </div>
    <div class="side-panel">
      <div class="panel-section">
        <h3>当前走棋</h3>
        <div class="player-indicator">
          <div class="stone-icon black" id="currentStone"></div>
          <div class="player-name" id="currentPlayerName">黑棋</div>
        </div>
      </div>
      <div class="panel-section">
        <h3>提子</h3>
        <div class="capture-row"><span><span class="stone-dot b"></span>黑</span><span id="captureBlack">0</span></div>
        <div class="capture-row"><span><span class="stone-dot w"></span>白</span><span id="captureWhite">0</span></div>
      </div>
      <div class="panel-section">
        <h3>棋盘</h3>
        <div class="size-selector">
          <button class="size-btn" data-size="9">9×9</button>
          <button class="size-btn" data-size="13">13×13</button>
          <button class="size-btn active" data-size="19">19×19</button>
        </div>
      </div>
      <div class="panel-section">
        <h3>操作</h3>
        <div class="btn-group">
          <button class="btn" id="btnPass">一手虚手</button>
          <button class="btn danger" id="btnResign">投子</button>
          <button class="btn" id="btnUndo">悔棋</button>
        </div>
        <div style="margin-top:6px">
          <button class="btn primary" id="btnNew" style="width:100%">新局</button>
        </div>
      </div>
      <div class="move-num" id="moveNumDisplay">第 0 手</div>
    </div>
  </div>
</div>
<div class="modal-overlay" id="scoreModal">
  <div class="modal">
    <h2 id="modalTitle">终局</h2>
    <div class="sub" id="modalSub">对局结束</div>
    <div class="scores" id="scoreDisplay">
      <div class="score-item"><div class="stone b"></div><div id="blackScoreVal" class="value">0</div><div>黑棋</div></div>
      <div class="score-item"><div class="stone w"></div><div id="whiteScoreVal" class="value">0</div><div>白棋</div></div>
    </div>
    <div class="sub" id="modalResult"></div>
    <div style="margin-top:12px; display:flex; gap:8px; justify-content:center;">
      <button class="btn primary" id="btnModalNew">新局</button>
      <button class="btn" id="btnModalClose">关闭</button>
    </div>
  </div>
</div>
<script>
const EMPTY = 0, BLACK = 1, WHITE = 2;

class GoGame {
  constructor(size = 19) {
    this.size = size;
    this.starPoints = this.getStarPoints(size);
    this.reset();
  }

  getStarPoints(size) {
    const map = {
      9:  [[3,3],[3,7],[7,3],[7,7],[5,5]],
      13: [[3,3],[3,7],[3,11],[7,3],[7,7],[7,11],[11,3],[11,7],[11,11]],
      19: [[3,3],[3,9],[3,15],[9,3],[9,15],[15,3],[15,9],[15,15]]
    };
    return map[size] || [];
  }

  reset() {
    this.board = Array.from({length: this.size}, () => Array(this.size).fill(EMPTY));
    this.currentPlayer = BLACK;
    this.captures = { [BLACK]: 0, [WHITE]: 0 };
    this.moveHistory = [];
    this.boardHistory = [];
    this.lastMove = null;
    this.consecutivePasses = 0;
    this.gameOver = false;
    this.moveCount = 0;
    this.winner = null;
  }

  cloneBoard() {
    return this.board.map(r => [...r]);
  }

  opponent(p) { return p === BLACK ? WHITE : BLACK; }

  neighbors(r, c) {
    const n = [];
    if (r > 0) n.push([r-1, c]);
    if (r < this.size-1) n.push([r+1, c]);
    if (c > 0) n.push([r, c-1]);
    if (c < this.size-1) n.push([r, c+1]);
    return n;
  }

  getGroup(board, r, c) {
    const color = board[r][c];
    if (color === EMPTY) return [];
    const visited = new Set();
    const group = [];
    const stack = [[r, c]];
    while (stack.length) {
      const [cr, cc] = stack.pop();
      const k = cr+','+cc;
      if (visited.has(k)) continue;
      visited.add(k);
      group.push([cr, cc]);
      for (const [nr, nc] of this.neighbors(cr, cc)) {
        if (board[nr][nc] === color && !visited.has(nr+','+nc)) {
          stack.push([nr, nc]);
        }
      }
    }
    return group;
  }

  liberties(board, group) {
    const libs = new Set();
    for (const [r, c] of group) {
      for (const [nr, nc] of this.neighbors(r, c)) {
        if (board[nr][nc] === EMPTY) libs.add(nr+','+nc);
      }
    }
    return libs.size;
  }

  isValidMove(r, c) {
    if (this.gameOver) return false;
    if (r < 0 || r >= this.size || c < 0 || c >= this.size) return false;
    if (this.board[r][c] !== EMPTY) return false;

    const test = this.cloneBoard();
    const opp = this.opponent(this.currentPlayer);
    test[r][c] = this.currentPlayer;

    let captured = 0;
    for (const [nr, nc] of this.neighbors(r, c)) {
      if (test[nr][nc] === opp) {
        const g = this.getGroup(test, nr, nc);
        if (this.liberties(test, g) === 0) {
          for (const [gr, gc] of g) test[gr][gc] = EMPTY;
          captured += g.length;
        }
      }
    }

    const own = this.getGroup(test, r, c);
    if (this.liberties(test, own) === 0) return false;

    if (captured === 1 && this.boardHistory.length > 0) {
      const prev = this.boardHistory[this.boardHistory.length - 1];
      let same = true;
      for (let i = 0; i < this.size && same; i++)
        for (let j = 0; j < this.size && same; j++)
          if (test[i][j] !== prev[i][j]) same = false;
      if (same) return false;
    }
    return true;
  }

  placeStone(r, c) {
    if (!this.isValidMove(r, c)) return false;

    this.boardHistory.push(this.cloneBoard());
    const opp = this.opponent(this.currentPlayer);

    this.board[r][c] = this.currentPlayer;
    let captured = 0;

    for (const [nr, nc] of this.neighbors(r, c)) {
      if (this.board[nr][nc] === opp) {
        const g = this.getGroup(this.board, nr, nc);
        if (this.liberties(this.board, g) === 0) {
          for (const [gr, gc] of g) this.board[gr][gc] = EMPTY;
          captured += g.length;
        }
      }
    }

    this.captures[this.currentPlayer] += captured;
    this.lastMove = { row: r, col: c };
    this.consecutivePasses = 0;
    this.moveCount++;
    this.moveHistory.push({ row: r, col: c, player: this.currentPlayer, pass: false });
    this.currentPlayer = opp;
    return true;
  }

  pass() {
    if (this.gameOver) return;
    this.moveHistory.push({ row: -1, col: -1, player: this.currentPlayer, pass: true });
    this.consecutivePasses++;
    this.moveCount++;
    if (this.consecutivePasses >= 2) {
      this.gameOver = true;
    }
    this.currentPlayer = this.opponent(this.currentPlayer);
  }

  resign() {
    this.gameOver = true;
    this.winner = this.opponent(this.currentPlayer);
  }

  undo() {
    if (this.moveHistory.length === 0) return false;
    if (this.boardHistory.length === 0) return false;

    const lastMove = this.moveHistory.pop();
    this.board = this.boardHistory.pop();
    this.currentPlayer = lastMove.player;
    this.moveCount--;

    if (lastMove.pass) {
      this.consecutivePasses = 1;
    } else {
      this.consecutivePasses = 0;
    }
    this.gameOver = false;
    this.lastMove = this.moveHistory.length > 0
      ? this.moveHistory[this.moveHistory.length - 1]
      : null;
    return true;
  }

  calculateScore() {
    const visited = Array.from({length: this.size}, () => Array(this.size).fill(false));
    const territory = { [BLACK]: 0, [WHITE]: 0 };

    for (let r = 0; r < this.size; r++) {
      for (let c = 0; c < this.size; c++) {
        if (this.board[r][c] === EMPTY && !visited[r][c]) {
          const region = [];
          const stack = [[r, c]];
          visited[r][c] = true;
          const borders = new Set();

          while (stack.length) {
            const [cr, cc] = stack.pop();
            region.push([cr, cc]);
            for (const [nr, nc] of this.neighbors(cr, cc)) {
              if (this.board[nr][nc] === EMPTY && !visited[nr][nc]) {
                visited[nr][nc] = true;
                stack.push([nr, nc]);
              } else if (this.board[nr][nc] !== EMPTY) {
                borders.add(this.board[nr][nc]);
              }
            }
          }

          if (borders.size === 1) {
            territory[borders.values().next().value] += region.length;
          }
        }
      }
    }

    let stonesB = 0, stonesW = 0;
    for (let r = 0; r < this.size; r++) {
      for (let c = 0; c < this.size; c++) {
        if (this.board[r][c] === BLACK) stonesB++;
        else if (this.board[r][c] === WHITE) stonesW++;
      }
    }

    const komi = 7.5;
    const scoreB = stonesB + territory[BLACK];
    const scoreW = stonesW + territory[WHITE] + komi;

    return {
      blackScore: scoreB,
      whiteScore: scoreW,
      territory,
      stones: { black: stonesB, white: stonesW },
      komi,
    };
  }
}

// --- Renderer ---
class GoRenderer {
  constructor(canvas, game) {
    this.canvas = canvas;
    this.ctx = canvas.getContext('2d');
    this.game = game;
    this.padding = 36;
    this.cellSize = 30;
    this.stoneRadius = 0;
    this.recalc();
    this.showingScore = false;
  }

  recalc() {
    const maxW = Math.min(window.innerWidth - 280, 720);
    const maxH = window.innerHeight - 160;
    const avail = Math.min(maxW, maxH) - this.padding * 2;
    const cells = this.game.size - 1;
    this.cellSize = Math.max(20, Math.min(36, Math.floor(avail / cells)));
    const boardPx = cells * this.cellSize;
    this.width = boardPx + this.padding * 2;
    this.height = this.width;
    this.stoneRadius = this.cellSize * 0.44;

    this.canvas.width = this.width;
    this.canvas.height = this.height;
    this.canvas.style.width = this.width + 'px';
    this.canvas.style.height = this.height + 'px';
    this.offset = this.padding;
  }

  gridToPixel(r, c) {
    return { x: this.offset + c * this.cellSize, y: this.offset + (this.game.size - 1 - r) * this.cellSize };
  }

  pixelToGrid(px, py) {
    const c = Math.round((px - this.offset) / this.cellSize);
    const r = this.game.size - 1 - Math.round((py - this.offset) / this.cellSize);
    return { row: r, col: c };
  }

  render() {
    const ctx = this.ctx;
    const s = this.game.size;

    ctx.fillStyle = '#c8a96e';
    ctx.fillRect(0, 0, this.width, this.height);

    ctx.strokeStyle = '#5a4a30';
    ctx.lineWidth = 1;
    for (let i = 0; i < s; i++) {
      const p = this.offset + i * this.cellSize;
      ctx.beginPath();
      ctx.moveTo(this.offset, p);
      ctx.lineTo(this.offset + (s-1)*this.cellSize, p);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(p, this.offset);
      ctx.lineTo(p, this.offset + (s-1)*this.cellSize);
      ctx.stroke();
    }

    for (const [r, c] of this.game.starPoints) {
      const { x, y } = this.gridToPixel(r, c);
      ctx.fillStyle = '#5a4a30';
      ctx.beginPath();
      ctx.arc(x, y, 4, 0, Math.PI*2);
      ctx.fill();
    }

    ctx.fillStyle = '#8a7a58';
    ctx.font = '11px -apple-system, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    for (let i = 0; i < s; i++) {
      const label = 'ABCDEFGHJKLMNOPQRST'[i];
      const x = this.offset + i * this.cellSize;
      ctx.fillText(label, x, this.padding - 20);
      ctx.fillText(label, x, this.height - this.padding + 20);
    }
    for (let i = 0; i < s; i++) {
      const y = this.offset + i * this.cellSize;
      ctx.textAlign = 'right';
      ctx.fillText(String(s - i), this.padding - 8, y);
      ctx.textAlign = 'left';
      ctx.fillText(String(s - i), this.height - this.padding + 8, y);
    }

    for (let r = 0; r < s; r++) {
      for (let c = 0; c < s; c++) {
        if (this.game.board[r][c] !== EMPTY) {
          this.drawStone(r, c, this.game.board[r][c]);
        }
      }
    }

    if (this.game.lastMove) {
      const { row, col } = this.game.lastMove;
      const color = this.game.board[row][col];
      if (color !== EMPTY) {
        const { x, y } = this.gridToPixel(row, col);
        ctx.fillStyle = color === BLACK ? '#ccc' : '#444';
        ctx.beginPath();
        ctx.arc(x, y, this.stoneRadius * 0.28, 0, Math.PI*2);
        ctx.fill();
      }
    }
  }

  drawStone(r, c, color) {
    const ctx = this.ctx;
    const { x, y } = this.gridToPixel(r, c);
    const R = this.stoneRadius;

    ctx.save();
    ctx.shadowColor = 'rgba(0,0,0,0.25)';
    ctx.shadowBlur = 3;
    ctx.shadowOffsetX = 1;
    ctx.shadowOffsetY = 1;

    const grad = ctx.createRadialGradient(x - R*0.3, y - R*0.35, R*0.1, x, y, R);
    if (color === BLACK) {
      grad.addColorStop(0, '#555');
      grad.addColorStop(0.6, '#222');
      grad.addColorStop(1, '#111');
    } else {
      grad.addColorStop(0, '#f8f8f8');
      grad.addColorStop(0.6, '#e0e0e0');
      grad.addColorStop(1, '#b0b0b0');
    }

    ctx.beginPath();
    ctx.arc(x, y, R, 0, Math.PI*2);
    ctx.fillStyle = grad;
    ctx.fill();
    ctx.restore();

    ctx.strokeStyle = color === BLACK ? '#000' : '#999';
    ctx.lineWidth = 0.8;
    ctx.beginPath();
    ctx.arc(x, y, R, 0, Math.PI*2);
    ctx.stroke();
  }
}

// --- App ---
const canvas = document.getElementById('board');
const game = new GoGame(19);
const renderer = new GoRenderer(canvas, game);

let selectedDead = [];

function updateUI() {
  const isBlack = game.currentPlayer === BLACK;
  document.getElementById('currentStone').className = 'stone-icon ' + (isBlack ? 'black' : 'white');
  document.getElementById('currentPlayerName').textContent = isBlack ? '黑棋' : '白棋';
  document.getElementById('captureBlack').textContent = game.captures[BLACK];
  document.getElementById('captureWhite').textContent = game.captures[WHITE];
  document.getElementById('moveNumDisplay').textContent = '第 ' + game.moveCount + ' 手';

  if (game.gameOver) {
    document.getElementById('statusText').textContent = '对局结束';
  } else {
    document.getElementById('statusText').textContent = isBlack ? '黑棋落子' : '白棋落子';
  }
}

function render() {
  renderer.render();
  if (renderer.showingScore) {
    for (const [r, c] of selectedDead) {
      renderer.markDead(r, c);
    }
  }
}

function handlePlace(r, c) {
  if (game.gameOver) return;
  if (!game.isValidMove(r, c)) return;
  game.placeStone(r, c);
  render();
  updateUI();
}

function handlePass() {
  if (game.gameOver) return;
  game.pass();
  render();
  updateUI();

  if (game.gameOver || game.consecutivePasses >= 2) {
    setTimeout(showScore, 400);
  }
}

function handleResign() {
  if (game.gameOver) return;
  game.resign();
  render();
  updateUI();
  showScore();
}

function handleUndo() {
  if (game.gameOver) return;
  if (game.undo()) {
    render();
    updateUI();
  }
}

function showScore() {
  const score = game.calculateScore();

  document.getElementById('modalTitle').textContent = game.winner
    ? (game.winner === BLACK ? '黑棋' : '白棋') + ' 中盘胜'
    : '终局数棋';
  document.getElementById('modalSub').textContent = game.winner
    ? (game.winner === BLACK ? '白棋' : '黑棋') + ' 投子认负'
    : '双方认可终局';

  document.getElementById('blackScoreVal').textContent = score.blackScore.toFixed(1);
  document.getElementById('whiteScoreVal').textContent = score.whiteScore.toFixed(1);

  const bv = document.getElementById('blackScoreVal');
  const wv = document.getElementById('whiteScoreVal');
  bv.className = 'value' + (score.blackScore > score.whiteScore ? ' win' : '');
  wv.className = 'value' + (score.whiteScore > score.blackScore ? ' win' : '');

  const diff = Math.abs(score.blackScore - score.whiteScore);
  const resultText = score.blackScore > score.whiteScore
    ? '黑棋胜 ' + diff.toFixed(1) + ' 目'
    : '白棋胜 ' + diff.toFixed(1) + ' 目（含贴目 7.5）';
  document.getElementById('modalResult').textContent = resultText;

  document.getElementById('scoreModal').classList.add('open');
}

function startNewGame(size) {
  game.size = size;
  game.starPoints = game.getStarPoints(size);
  game.reset();
  renderer.game = game;
  renderer.recalc();
  selectedDead = [];
  renderer.showingScore = false;
  document.getElementById('scoreModal').classList.remove('open');
  render();
  updateUI();

  document.querySelectorAll('.size-btn').forEach(b => {
    b.classList.toggle('active', parseInt(b.dataset.size) === size);
  });
}

canvas.addEventListener('click', (e) => {
  if (game.gameOver) return;
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  const px = (e.clientX - rect.left) * scaleX;
  const py = (e.clientY - rect.top) * scaleY;
  const { row, col } = renderer.pixelToGrid(px, py);
  if (row >= 0 && row < game.size && col >= 0 && col < game.size) {
    handlePlace(row, col);
  }
});

canvas.addEventListener('touchend', (e) => {
  e.preventDefault();
  if (game.gameOver) return;
  const touch = e.changedTouches[0];
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  const px = (touch.clientX - rect.left) * scaleX;
  const py = (touch.clientY - rect.top) * scaleY;
  const { row, col } = renderer.pixelToGrid(px, py);
  if (row >= 0 && row < game.size && col >= 0 && col < game.size) {
    handlePlace(row, col);
  }
}, { passive: false });

document.getElementById('btnPass').addEventListener('click', handlePass);
document.getElementById('btnResign').addEventListener('click', handleResign);
document.getElementById('btnUndo').addEventListener('click', handleUndo);
document.getElementById('btnNew').addEventListener('click', () => startNewGame(game.size));

document.getElementById('btnModalNew').addEventListener('click', () => startNewGame(game.size));
document.getElementById('btnModalClose').addEventListener('click', () => {
  document.getElementById('scoreModal').classList.remove('open');
});

document.querySelectorAll('.size-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    startNewGame(parseInt(btn.dataset.size));
  });
});

document.addEventListener('keydown', (e) => {
  if (e.key === 'p' || e.key === 'P') handlePass();
  if ((e.key === 'z' || e.key === 'Z') && (e.ctrlKey || e.metaKey)) { e.preventDefault(); handleUndo(); }
});

window.addEventListener('resize', () => {
  renderer.recalc();
  render();
});

renderer.recalc();
render();
updateUI();
</script>
</body>
</html>
